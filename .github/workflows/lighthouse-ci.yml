name: Lighthouse CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Serve dist
        run: npx http-server ./dist -p 8080 &
      - name: Wait for server
        run: npx wait-on http://127.0.0.1:8080
      - name: Run Lighthouse
        run: |
          npx lighthouse http://127.0.0.1:8080 --output=json --output-path=./lighthouse-report-ci.json --chrome-flags="--headless=new --no-sandbox --disable-gpu"
      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report-ci.json
